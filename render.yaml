services:
  - type: web
    name: government-schemes-api
    runtime: python
    pythonVersion: "3.11"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: "10000"